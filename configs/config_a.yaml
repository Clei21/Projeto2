use_qlora: true

lora_r: 16
lora_alpha: 32
lora_dropout: 0.05
target_modules:
  - q_proj
  - k_proj
  - v_proj
  - o_proj

num_train_epochs: 1
per_device_train_batch_size: 4
gradient_accumulation_steps: 4
learning_rate: 0.0002
lr_scheduler_type: cosine
warmup_ratio: 0.03
optim: paged_adamw_8bit
max_seq_length: 2048
packing: false
logging_steps: 20
